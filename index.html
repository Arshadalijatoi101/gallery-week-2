<!DOCTYPE html>
<!--
  Week 2 Demo Project
  Topic: CSS Grid & Responsive Design
  This file demonstrates:
  - Grid template areas
  - Responsive units (rem, %, em)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Makes layout responsive on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Photo Gallery | CSS Grid Demo</title>

  <!-- Linking external CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Page layout container using CSS Grid -->
  <div class="layout">

    <!-- Header area -->
    <header class="header">
      <h1>Photo Gallery</h1>
      <p>CSS Grid & Responsive Design Demo</p>
    </header>

    <!-- Navigation area -->
    <nav class="nav">
      <a class="nav-link" href="home.html">Home</a>
      <a class="nav-link" href="About.html">About</a>
      <a class="nav-link active" href="index.html">Gallery</a>
    </nav>

    <!-- Main content area -->
    <main class="main">
      <h2>Responsive Grid Gallery</h2>

      <!-- Gallery grid -->
      <section class="gallery">

        <!-- Each image is a grid item -->
        <figure class="card">
          <img src="assets/img1.jpg.jpeg" alt="Assan" />
          <figcaption>Assan</figcaption>
        </figure>

        <figure class="card">
          <img src="assets/img2.jpg.jpeg" alt="card" />
          <figcaption>Card</figcaption>
        </figure>

        <figure class="card">
          <img src="assets/img3.jpg.jpeg" alt="black" />
          <figcaption>black</figcaption>
        </figure>

        <figure class="card">
          <img src="assets/img4.jpg.jpeg" alt="City" />
          <figcaption>City</figcaption>
        </figure>

        <figure class="card">
          <img src="assets/img5.jpg.jpeg" alt="River" />
          <figcaption>River</figcaption>
        </figure>

        <figure class="card">
          <img src="assets/img6.jpg.jpeg" alt="Desert" />
          <figcaption>Desert</figcaption>
        </figure>

      </section>
    </main>

    <!-- Footer area -->
    <footer class="footer">
      <p>© 2026 Web Development Class — CSS Grid Demo</p>
    </footer>

  </div>

</body>
</html>
